<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Panel Admin</title>
    <link rel="stylesheet" href="css/admin.css" />
    <!-- 👈 enlace al CSS -->
  </head>
  <body>
    <div class="container">
      <h3>Panel Admin</h3>

      <label for="correo">Correo del Usuario:</label>
      <input type="text" id="correo" placeholder="usuario@correo.com" />
      <button onclick="buscarPorCorreo()">Buscar UID</button>

      <label for="uid">UID del Usuario:</label>
      <input type="text" id="uid" placeholder="Ingresa UID del usuario" />
      <button onclick="activarUsuario()">Activar</button>
      <button onclick="desactivarUsuario()">Desactivar</button>
    </div>

    <script type="module" src="./js/admin.js"></script>
  </body>
</html>
