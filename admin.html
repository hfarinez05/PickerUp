<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Panel Admin</title>
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body>
    <div class="container">
      <h3>Panel Admin</h3>

      <label for="correo">Correo del Usuario:</label>
      <input type="text" id="correo" placeholder="usuario@correo.com" />
      <button onclick="buscarPorCorreo()">Buscar Usuario</button>

      <button onclick="activarUsuario()">Activar</button>
      <button onclick="desactivarUsuario()">Desactivar</button>

      <hr />

      <button onclick="buscarActivos()">Ver Activos</button>
      <button onclick="buscarInactivos()">Ver Inactivos</button>

      <div id="resultado"></div>
    </div>

    <script type="module" src="./js/admin.js"></script>
  </body>
</html>
